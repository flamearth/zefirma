<!doctype html>
<html>
    <head>
        <title
            >Publisher
            </title>
        <!-- Кодировка языка -->
        <meta
            charset=
                "utf-8"
            >
        <!-- Лицо: Маленькое -->
        <link
            rel=
                "icon"
            href=
                "../content/small.png"
            >
        <!-- Тип -->
        <meta
            property=
                "og:type"
            content=
                "website"
            >
        <!-- Объяснение -->
        <meta
            property=
                "og:description"
            content=
                "Modern solutions for the growth of your business."
            >
        <!-- Обёртка -->
        <meta
            property=
                "og:image"
            content=
                "https://thephyrma.com/publisher/content/preview.png"
            >
        <!-- Ссылка -->
        <meta
            property=
                "og:url"
            content=
                "https://thephyrma.com/publisher/english.html"
            >
        <!-- Адаптация -->
        <meta
            name=
                "viewport"
            content=
                "width=device-width, initial-scale=1.0"
            >
        <style>
            :root
                 {
                /* 100% */
                --1111: #000000;
                --9191: #FFFFFF;
                /* 85% */
                --11185: #000000D9;
                --91985: #FFFFFFD9;
                /* 65% */
                --11165: #000000A6;
                --91965: #FFFFFFA6;
                /* 35% */
                --11135: #00000059;
                --91935: #FFFFFF59;
                /* 10% */
                --11110: #0000001A;
                --91910: #FFFFFF1A;
                /* 0% */
                --1110: #00000000;
                --9190: #FFFFFF00;
                }
            *
                {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                }
            a
                {
                text-decoration: none;
                color: inherit;
                }
            html
                {
                width: 100%;
                height: 100%;
                display: block;
                background: var(--1111);
                color: var(--9191);
                font-family: sans-serif;
                font-size: 21px;
                font-weight: 300;
                }
            body
                {
                width: 100%;
                 
                display: flex;
                flex-direction: column;
                align-items: center;
                 
                background: var(--111);
                 
                padding: 0px;
                margin: 0px;
                gap: 20px;
                 
                position: static;
                z-index: auto;
                }
            .space-between
                {
                width: 100%;
                 
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                 
                padding-top: 18px;
                padding-right: 20px;
                padding-bottom: 18px;
                padding-left: 20px;
                 
                background: linear-gradient(to bottom, var(--1111), var(--1110));
                
                position: fixed;
                z-index: 1;
                 }
            .button
                {
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 20px;
                overflow: hidden;
                transition: transform 0.2s ease;
                }
            .button:hover
                {
                backdrop-filter: blur(10px);
                background: var(--91910);
                }
            @media (max-width: 440px)
                {
                .space-between
                    {
                    padding-right: 30px;
                    padding-left: 30px;
                    }
                .button
                    {
                    backdrop-filter: blur(10px);
                    background: var(--91910);
                    }
                }
            </style>
        </head>
    <body>
        <!-- Верх -->
        <div
             class="space-between"
            >
                <!-- Фирма -->
                <a
                    href="../index.html"
                    class="button"
                    style=
                        "
                        height: 40px;
                        width: 40px;
                        font-size: 21px;
                        "
                    >ze
                    </a>
                <!-- Название -->
                <h1
                    style=
                        "
                        font-size: 18px;
                        font-weight: 500;
                        "
                    >Leading a deals
                    </h1>
                <!-- Продолжить -->
                <a
                    href="pages/languages.html"
                    class="button"
                    style=
                        "
                        height: 40px;
                        width: 40px;
                        font-size: 21px;
                        "
                    >EN
                    </a>
                </div>
        <!-- Ряд -->
        <div
            style=
                "
                flex-direction: column;
                justify-content: flex-start;
                align-items: stretch;
                 
                display: flex;
                 
                margin-top: 78px;
                margin-botom: 78px;
                 
                gap: 0px;
                 
                "
            >
                <!-- О издателе  -->
                <div
                    style=
                        "
                        max-height: 720px;
                         
                        display: flex;
                        flex-direction: column;
                        justify-content: flex-start;
                        align-items: stretch;
                         
                        padding-top: 80px;
                        padding-right: 20px;
                        padding-bottom: 80px;
                        padding-left: 20px;
                         
                        gap: 10px;
                        "
                    >
                        <h1
                            style=
                                "
                                 
                                font-family: serif;
                                font-style: italic;
                                font-size: 21px;
                                font-weight: 300;
                                text-align: center;
                                 
                                color: var(--91965);
                                "
                            >Modern solutions for the growth of your business
                            </h1>
                        <h2
                            style=
                                "
                                max-width: 720px;
                                 
                                font-size: 40px;
                                font-weight: 300;
                                text-align: center;
                                 
                                color: var(--9191);
                                "
                            >Applications for gaining a better experience from working in your own field
                            </h2>
                    </div>
                <!-- Изображение -->
                <div
                    style=
                        "
                        width: 100%;
                         
                        flex-direction: column;
                         
                        padding-top: 80px;
                        padding-right: 10px;
                        padding-bottom: 80px;
                        padding-left: 10px;
                         
                        overflow: hidden;
                        "
                    >
                        <img
                            src="content/first.png"
                            style=
                                "
                                width: 100%;
                                max-width: 720px;
                                height: 360px;
                                 
                                object-fit: cover;
                                 
                                border-radius: 32px;
                                "
                            >
                    </div>
                <!-- Миссия  -->
                <!-- Исходные данные -->
                <a
                    href="brand/identity.html"
                    class="button"
                    style=
                        "
                        font-size: 21px;
                         
                        padding-top: 9px;
                        padding-right: 18px;
                        padding-bottom: 9px;
                        padding-left: 18px;
                        "
                    >Get logotypes
                    </a>
            </div>
        </body>
    </html>
