<!-- Установки страницы -->
<html view="dark">
<head>
    <title>Entrance</title>
    <!-- Кодировка языка -->
    <meta
        charset="utf-8">
    <!-- Лицо: Большое -->
    <link
        rel="apple-touch-icon"
        href="pics/large.png">
    <!-- Лицо: Маленькое -->
    <link
        rel="icon"
        href="../pics/small.png">
    <!-- Веб Сайт -->
    <meta
        property="og:type"
        content="website">
    <!-- Объяснение -->
    <meta
        name="description"
        content="Create or log in tour personal account">
    <!-- Обёртка -->
    <meta
        property="og:image"
        content="https://name.name/pics/preview.png">
    <!-- Ссылка -->
    <meta
        property="og:url"
        content="https://name.name/services/entrance.html">
    <!-- Адаптация -->
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">
    <style>
        /* pallete */
        :root {
            /* dark */
             /* 100% */
            --000: #2c2c2c;
            --808: #FFFFFF;
             /* 85% */
            --00085: #000000D9;
            --80885: #FFFFFFD9;
             /* 65% */
            --00065: #000000A6;
            --80865: #FFFFFFA6;
             /* 35% */
            --00035: #00000059;
            --80835: #FFFFFF59;
              /* 10% */
            --00010: #0000001A;
            --80810: #FFFFFF1A;
             /* 0% */
            --0000: #2c2c2c00;
            --8080: #FFFFFF00; }
        /* light */
        html[view="light"] {
             /* 100% */
            --000: #FFFFFF;
            --808: #2c2c2c;
             /* 85% */
            --00085: #FFFFFFD9;
            --80885: #000000D9;
             /* 65% */
            --00065: #FFFFFFA6;
            --80865: #000000A6;
             /* 35% */
            --00035: #FFFFFF59;
            --80835: #00000059;
              /* 10% */
            --00010: #0000001A;
            --80810: #FFFFFF1A;
             /* 0% */
            --0000: #FFFFFF00;
            --8080: #2c2c2c00; }
        * {
            box-sizing: border-box; }
        a {
            text-decoration: none;
            color: inherit; }
        html {
            width: 100%;
            height: 100%;
            display: block;
            background: var(--000);
            color: var(--808);
            font-family: sans-serif;
            font-size: 21px;
            font-weight: 300; }
        body {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--000);
            padding: 0px;
            margin: 0px;
            gap: 20px;
            position: static;
            z-index: auto; }
        .space-between {
            width: 100%;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
             
            padding-top: 18px;
            padding-right: 20px;
            padding-bottom: 18px;
            padding-left: 20px;
             
            background: linear-gradient(to bottom, var(--000), var(--0000));
            
            position: fixed;
            z-index: 1; }
        .button {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.2s ease; }
        .button:hover {
            backdrop-filter: blur(10px);
            background: var(--80810); }
        /* Смена вида */
        html[view="light"] .button:hover {
            background: var(--00010); }
        @media (max-width: 440px) {
            .space-between {
                padding-right: 20px;
                padding-left: 20px; }
            .button {
                backdrop-filter: blur(10px);
                background: var(--0010); }
    </style>
    <script>
        // применить тему при загрузке
        (function () {
            const saved = localStorage.getItem('view');
            if (saved) {
                document.documentElement.setAttribute('view', saved);
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('view', prefersDark ? 'dark' : 'light'); }
        // следить за сменой темы устройства
        const media = window.matchMedia('(prefers-color-scheme: dark)');
            media.addEventListener('change', (e) => {
                 if (!localStorage.getItem('view')) {
                document.documentElement.setAttribute('view', e.matches ? 'dark' : 'light'); }
            });
        })();
    </script>
</head>
<body>
    <!-- Верх -->
    <div
         class="space-between">
            <!-- Вернутся -->
            <div
                class="button"
                style="
                    height: 40px;
                    width: 40px;"
                onclick="
                    history.back()"
                    >←
                </div>
            <!-- Название -->
            <h1
                style="
                    font-size: 18px;
                    font-weight: 500;">
                Вход
                </h1>
            <!-- Продолжить -->
            <a
                href="services/account.html"
                class="button"
                style="
                    height: 40px;
                    width: 40px;
                    font-size: 21px;">
                ✓</a>
            </div>
    <!-- Ряд -->
    <div
        style="
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-radius: 28px;
            padding-top: 16px;
            padding-right: 20px;
            padding-bottom: 16px;
            padding-left: 20px;
            margin-top: 78px;
            margin-left: 20px;
            margin-bottom: 2px;
            margin-right: 20px;
            background: var(--80810);
            max-width: 440px;">
        <!-- Имя -->
        <input
            style="
                width: 100%;
                color: inherit;
                font: inherit;
                text-align: center;
                border: none;
                outline: none;
                background: transparent;"
                appearance: none;
                -webkit-appearance: none;
                -moz-appearance: none;
             type="text"
             placeholder="inbox@mail.space">
        <!-- Черта -->
        <div
            style="
                height: 1.5px;
                width: 100%;
                background: var(--80810);"></div>
        <!-- Ключ -->
        <input
            style="
                width: 100%;
                color: inherit;
                font: inherit;
                text-align: center;
                border: none;
                outline: none;
                background: transparent;"
                appearance: none;
                -webkit-appearance: none;
                -moz-appearance: none;
             type="text"
             placeholder="key">
        <!-- Черта -->
        <div
            style="
                height: 1.5px;
                width: 100%;
                background: var(--80810);"></div>
        <!-- Уведомление -->
        <p
            style="
                font-size: 18px;
                text-align: center;
                margin: 0;
                padding: 0;
                color: var(--80865);">
            Замене и восстановлению не подлежит!
            </p>
        </div>
        <p
            style="
                width: 100%;
                font-size: 18px;
                text-align: center;
                margin-top: 2px;
                margin-left: 20px;
                margin-bottom: 2px;
                margin-right: 20px;
                max-width: 400px;
                color: var(--80865);">
            Продолжая, вы подтверждаете, что вам есть 13 лет и принимаете
            <a
                href="documents.html"
                style="
                    text-decoration: underline;
                    color:inherit;">
                Условия использования и Политику конфиденциальности
                </a>
            </p>
</body>
</html>
