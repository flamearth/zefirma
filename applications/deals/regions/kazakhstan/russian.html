<!-- Установки страницы -->
<html view="dark">
<head>
    <title>Deals</title>
    <!-- Кодировка языка -->
    <meta
        charset="utf-8">
    <!-- Кодировки цветов -->
    <link
        rel="stylesheet"
        href="../../../../sourse/colors.css">
    <!-- Лицо: Большое -->
    <link
        rel="apple-touch-icon"
        href="../../../../applications/deals/pics/large.png">
    <!-- Лицо: Маленькое -->
    <link
        rel="icon"
        href="../../../../applications/deals/pics/small.png">
    <!-- Местофикация -->
    <script
        src="/localization/action.js">
        </script>
    <!-- Веб Сайт -->
    <meta
        property="og:type"
        content="website">
    <!-- Объяснение -->
    <meta
        name="description"
        content="Description">
    <!-- Обёртка -->
    <meta
        property="og:image"
        content="https://name.name/pics/preview.png">
    <!-- Ссылка -->
    <meta
        property="og:url"
        content="https://name.name/">
    <!-- Адаптация -->
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box; }
        a {
            text-decoration: none;
            color: inherit; }
        html {
            width: 100%;
            height: 100%;
            display: block;
            background: var(--000);
            color: var(--808);
            font-family: sans-serif;
            font-size: 21px;
            font-weight: 300; }
        body {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--000);
            padding: 0px;
            margin: 0px;
            gap: 0px;
            position: static;
            z-index: auto; }
        .space-between {
            width: 100%;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
             
            padding-top: 18px;
            padding-right: 20px;
            padding-bottom: 18px;
            padding-left: 20px;
             
            background: linear-gradient(to bottom, var(--000), var(--0000));
            
            position: fixed;
            z-index: 1; }
        .one {
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 80px;
            padding-right: 20px;
            padding-bottom: 80px;
            padding-left: 20px;
            gap: 20px; }
        .button {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.2s ease; }
        .button:hover {
            backdrop-filter: blur(10px);
            background: var(--80810); }
        /* Смена вида */
        html[view="light"] .button:hover {
            background: var(--00010); }
        @media (max-width: 440px) {
            .space-between {
                padding-right: 20px;
                padding-left: 20px; }
            .button {
                backdrop-filter: blur(10px);
                background: var(--00010); }
    </style>
    <script>
        // применить тему при загрузке
        (function () {
            const saved = localStorage.getItem('view');
            if (saved) {
                document.documentElement.setAttribute('view', saved);
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('view', prefersDark ? 'dark' : 'light'); }
        // следить за сменой темы устройства
        const media = window.matchMedia('(prefers-color-scheme: dark)');
            media.addEventListener('change', (e) => {
                 if (!localStorage.getItem('view')) {
                document.documentElement.setAttribute('view', e.matches ? 'dark' : 'light'); }
            });
        })();
    </script>
</head>
<body>
    <!-- Верх -->
    <div
         class="space-between">
            <!-- Первый бутон -->
            <a
                href="../../../../index.html"
                class="button"
                style="
                    height: 40px;
                    width: 40px;
                    font-size: 18px;"
                >RU
                </a>
            <script>
                document.getElementById('changeLang').href += encodeURIComponent(location.pathname + location.search);
                </script>
            <!-- Название -->
            <h1
                style="
                    font-size: 18px;
                    font-weight: 500;">
                Ведение дел
                </h1>
            <!-- Второй бутон -->
            <div
                class="button"
                style="
                    height: 40px;
                    width: 40px;"
                onclick="
                    const d = document.documentElement;
                    const isLight = d.getAttribute('view') === 'light';
                    const newView = isLight ? 'dark' : 'light';
                    d.setAttribute('view', newView);
                    localStorage.setItem('view', newView);
                    this.innerText = isLight ? '☽' : '☀︎';
                    ">☽
                </div>
            </div>
    <!-- № Сообщения -->
    <div
        class="one"
        style="
            margin-top: 76px;
            font-size: 48px;">
        <!-- Изображение -->
        <div
            style="
                border-radius: 28px;
                 overflow: hidden;
                height: 96px;
                width: 96px;">
                <img
                    src="../../../../applications/deals/pics/large.png"
                    style="
                        width: 100%;
                        display: block;"></div>
        <!-- Сообщение -->
        <h1
            style="
                max-width: 720px;
                text-align: center;
                font-weight: 300;
                font-size: 48px;">
            Начни вести дела без оплаты уже сейчас!</h1>
        <!-- Бутон -->
        <a
            href="../../../../applications/deals/services/entrance.html"
            class="button"
            style=
                "
                font-size: 18px;
                
                padding-top: 9px;
                padding-right: 18px;
                padding-bottom: 9px;
                padding-left: 18px;
                "
            >Начать
            </a>
        </div>
</body>
</html>
